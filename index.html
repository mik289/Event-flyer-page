<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Page</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Requirement 1: Header within body -->
    <header>
        <!-- Requirement 2: img as first child -->
        <img src="https://placeholder.com" alt="Event Banner">
        <!-- Requirement 3, 4 & 5: One single h1 as second child with event title -->
        <h1>Annual Tech Conference 2026</h1>
    </header>

    <!-- Requirement 6: Main element within body -->
    <main>
        <!-- Requirement 7: First section element -->
        <section>
            <!-- Requirement 8 & 9: Non-empty h2 inside section -->
            <h2>Event Schedule</h2>
            <p>Join us for exciting keynote speakers and workshops throughout the day.</p>
        </section>

        <!-- Requirement 15: At least one hr element -->
        <hr>

        <!-- Requirement 7: Second section element -->
        <section>
            <!-- Requirement 8 & 9: Non-empty h2 inside section -->
            <h2>Registration Details</h2>
            <p>Tickets are free but limited. Reserve your spot online today.</p>
        </section>
    </main>

</body>
</html>
